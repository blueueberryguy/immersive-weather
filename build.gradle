plugins {
	id 'java'
}

repositories {
	mavenLocal()
	maven {
		url = 'https://repo.runelite.net'
	}
	mavenCentral()
}

def runeLiteVersion = 'latest.release'

dependencies {
	implementation files('libs/jaco-mp3-player-0.9.5.jar')

	compileOnly group: 'net.runelite', name:'client', version: runeLiteVersion

	compileOnly 'org.projectlombok:lombok:1.18.20'
	annotationProcessor 'org.projectlombok:lombok:1.18.20'

	testImplementation 'junit:junit:4.12'
	testImplementation group: 'net.runelite', name:'client', version: runeLiteVersion
	testImplementation group: 'net.runelite', name:'jshell', version: runeLiteVersion
}

group = 'com.weather3d'
version = '1.2.7'
sourceCompatibility = '1.9'

tasks.withType(JavaCompile) {
	options.encoding = 'UTF-8'
}

tasks.register('runRuneLite', JavaExec) {
	group = 'application'
	description = 'Launches the dev RuneLite client with the 3D Weather plugin sideloaded'
	classpath = sourceSets.test.runtimeClasspath
	mainClass = 'com.weather3d.CyclesTest'
	jvmArgs = ['-ea', '-Djava.net.preferIPv4Stack=true']
}
